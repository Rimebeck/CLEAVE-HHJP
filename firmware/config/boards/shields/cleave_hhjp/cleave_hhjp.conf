# Cleave HHJP - Common Configuration

# NFC pins as GPIO (REQUIRED for D11/D12 usage on nRF52840)
CONFIG_NFCT_PINS_AS_GPIOS=y

# Split keyboard configuration
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# Increase BLE transmission power for stable split communication
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Battery reporting
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Power management
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ZMK Studio support (dynamic keymap changes via GUI)
CONFIG_ZMK_STUDIO=y

# Bluetooth configuration
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6

# Disable GATT subscription enforcement for better compatibility
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
