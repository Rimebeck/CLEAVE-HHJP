# .github/workflows/promote-to-release.yml
name: Promote Firmware to Release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'ArtifactがあるActionsのRun ID'
        required: true
        type: string
      version:
        description: 'リリースバージョン (例: v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'プレリリースとしてマークする'
        required: false
        type: boolean
        default: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Firmware Artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download ${{ inputs.run_id }} --name "firmware" --dir ./artifacts
          echo "=== Downloaded files ==="
          ls -la ./artifacts/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: artifacts/*
