name: Build ZMK firmware
on:
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - 'build.yaml'
      - '.github/workflows/build-firmware.yml'
  pull_request:
    paths:
      - 'config/**'
      - 'build.yaml'
      - '.github/workflows/build-firmware.yml'

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3-branch
