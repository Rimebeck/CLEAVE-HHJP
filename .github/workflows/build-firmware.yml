name: Build Firmware

on:
  push:
    branches:
      - main
    paths:
      - 'firmware/**'
  pull_request:
    branches:
      - main
    paths:
      - 'firmware/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            firmware/modules/
            firmware/tools/
            firmware/zephyr/
            firmware/bootloader/
            firmware/zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('firmware/config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        working-directory: firmware
        run: west init -l config

      - name: West Update
        working-directory: firmware
        run: west update

      - name: West Zephyr export
        working-directory: firmware
        run: west zephyr-export

      - name: West Build (Cleave HHJP Left)
        working-directory: firmware
        run: west build -s zmk/app -b xiao_ble -- -DSHIELD=cleave_hhjp_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/firmware/config"

      - name: Cleave HHJP Left Kconfig file
        working-directory: firmware
        run: cat build/zephyr/.config | grep -v "^#" | grep -v "^$"

      - name: Rename zmk.uf2
        working-directory: firmware
        run: cp build/zephyr/zmk.uf2 cleave_hhjp_left-xiao_ble-zmk.uf2

      - name: Archive (Cleave HHJP Left)
        uses: actions/upload-artifact@v4
        with:
          name: cleave_hhjp_left-xiao_ble-zmk
          path: firmware/cleave_hhjp_left-xiao_ble-zmk.uf2

      - name: Clean build directory
        working-directory: firmware
        run: rm -rf build

      - name: West Build (Cleave HHJP Right)
        working-directory: firmware
        run: west build -s zmk/app -b xiao_ble -- -DSHIELD=cleave_hhjp_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/firmware/config"

      - name: Cleave HHJP Right Kconfig file
        working-directory: firmware
        run: cat build/zephyr/.config | grep -v "^#" | grep -v "^$"

      - name: Rename zmk.uf2
        working-directory: firmware
        run: cp build/zephyr/zmk.uf2 cleave_hhjp_right-xiao_ble-zmk.uf2

      - name: Archive (Cleave HHJP Right)
        uses: actions/upload-artifact@v4
        with:
          name: cleave_hhjp_right-xiao_ble-zmk
          path: firmware/cleave_hhjp_right-xiao_ble-zmk.uf2
