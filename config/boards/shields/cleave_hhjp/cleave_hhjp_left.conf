# Cleave HHJP - Left Side Configuration

# Central role (connects to right side peripheral)
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1

# ZMK Studio support (central side only for split keyboards)
CONFIG_ZMK_STUDIO=y

# ZMK Studio - Disable locking (always allow keymap changes)
CONFIG_ZMK_STUDIO_LOCKING=n
