# Cleave HHJP - Common Configuration

# Increase BLE transmission power for stable split communication
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Battery reporting (fetching from peripheral + proxy to host)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Power management
CONFIG_ZMK_SLEEP=y

# GPIO hog for BQ25101 charging current control (P0.13)
# P0.13 → 2.7kΩ → ISET pin. Output LOW = 100mA (2.7k∥2.7k=1.35kΩ)
CONFIG_GPIO_HOGS=y

# Bluetooth configuration
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Disable GATT subscription enforcement for better compatibility
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
